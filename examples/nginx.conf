server {
    listen 443 ssl http2;
    server_name conductor.example.io;

    ssl_certificate     /etc/letsencrypt/live/conductor.example.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/conductor.example.io/privkey.pem;

    location /webhook {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Plane-Signature $http_x_plane_signature;
        client_max_body_size 1m;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }
}

server {
    listen 80;
    server_name conductor.example.io;
    return 301 https://$host$request_uri;
}
