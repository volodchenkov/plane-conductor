# SDLC example workspace — full pipeline (analyst → architect → designer →
# coders → testers → reviewer). 10 agents.
#
# Copy to /etc/plane-conductor/conductor.d/<your-slug>.yaml, edit, chmod 600.
# IMPORTANT: this file holds secrets. Do NOT commit your edited copy.
#
# How nickname → agent works:
#   1. The user mentions @<nickname> in a Plane issue comment.
#   2. Plane sends a webhook to /<workspace_slug>/webhook.
#   3. The orchestrator looks up the mentioned member's email
#      (e.g. <nickname>@<email_domain>) and splits the local-part.
#   4. The local-part matches `agents` here → spawns
#      `claude --agent <nickname> --print` with issue context piped to stdin.
#   5. The agent's prompt file `<prompt_role>.md` lives in `prompts_dir`;
#      that file is what defines the agent's behaviour.

# --- Identity / Plane connection ---
workspace_slug: sdlc              # MUST match the filename stem.
plane_base_url: https://plane.example.io
plane_api_key: plane_api_xxxxxxxxxxxxxxxxxxxxxxxx
project_id: 00000000-0000-0000-0000-000000000000
initiator_uuid: 00000000-0000-0000-0000-000000000099

# --- Webhook ---
webhook_secret: replace-me-with-openssl-rand-hex-32

# --- Agent invocation ---
email_domain: example.io
prompts_dir: /home/you/Projects/yourproject/.claude/agents
agent_working_dir: /home/you/Projects/yourproject

# --- Agents ---
agents:
  - nickname: castor
    prompt_role: business-analyst
    display_name: Castor — Business Analyst
  - nickname: sark
    prompt_role: system-analyst
    display_name: Sark — System Analyst
  - nickname: flynn
    prompt_role: architect
    display_name: Flynn — Architect
  - nickname: quorra
    prompt_role: designer
    display_name: Quorra — Designer
  - nickname: rinzler
    prompt_role: python-developer
    display_name: Rinzler — Python Dev
  - nickname: ram
    prompt_role: vue-developer
    display_name: Ram — Vue Dev
  - nickname: beck
    prompt_role: react-developer
    display_name: Beck — React Dev
  - nickname: yori
    prompt_role: api-tester
    display_name: Yori — API Tester
  - nickname: gem
    prompt_role: ui-tester
    display_name: Gem — UX Tester
  - nickname: dumont
    prompt_role: reviewer
    display_name: Dumont — Reviewer

labels:
  artifacts:
    - { name: "artifact:requirements", color: "#7c3aed" }
    - { name: "artifact:spec", color: "#3b82f6" }
    - { name: "artifact:design", color: "#ec4899" }
    - { name: "artifact:backend", color: "#10b981" }
    - { name: "artifact:frontend", color: "#22d3ee" }
    - { name: "artifact:api-testing", color: "#f59e0b" }
    - { name: "artifact:ux-testing", color: "#f97316" }
    - { name: "artifact:review", color: "#ef4444" }
  roles:
    - { name: "role:business-analyst", color: "#a78bfa" }
    - { name: "role:system-analyst", color: "#60a5fa" }
    - { name: "role:architect", color: "#818cf8" }
    - { name: "role:designer", color: "#f472b6" }
    - { name: "role:python-developer", color: "#34d399" }
    - { name: "role:vue-developer", color: "#4ade80" }
    - { name: "role:react-developer", color: "#67e8f9" }
    - { name: "role:api-tester", color: "#fbbf24" }
    - { name: "role:ui-tester", color: "#fb923c" }
    - { name: "role:reviewer", color: "#fca5a5" }

states:
  - { name: Review, group: started, color: "#f59e0b" }
  - { name: Blocked, group: unstarted, color: "#ef4444" }

announce_spawn: true
