repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.6
          - pydantic-settings>=2.2
          - structlog>=24.1
          - types-PyYAML
          - fastapi>=0.110
          - typer>=0.12
          - uvicorn>=0.27
          - mcp>=1.0
        args: [--config-file=pyproject.toml]
        files: ^src/plane_conductor/
